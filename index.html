<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Botão para alternar entre dark e light mode -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">
        <span class="theme-icon">🌙</span>
    </button>
    
    <main>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponiveis">
            <nav class="profiles">
                <a href="catalogo/catalogo.html" class="profile" data-nome="Luca" data-imagem="/imersao-alura/assets/perfil-1.png">
                    <figure>
                        <img src="assets/perfil-1.png" alt="Foto do perfil 1">
                        <figcaption>Luca</figcaption>
                    </figure>
                </a>
                <a href="catalogo/catalogo.html" class="profile" data-nome="Mariah" data-imagem="/imersao-alura/assets/perfil-2.png">
                    <figure>
                        <img src="assets/perfil-2.png" alt="Foto do perfil 2">
                        <figcaption>Mariah</figcaption>
                    </figure>
                </a>
                <a href="catalogo/catalogo.html" class="profile" data-nome="Carla" data-imagem="/imersao-alura/assets/perfil-3.png">
                    <figure>
                        <img src="assets/perfil-3.png" alt="Foto do perfil 3">
                        <figcaption>Carla</figcaption>
                    </figure>
                </a>
                <a href="catalogo/catalogo.html" class="profile" data-nome="Luciano" data-imagem="/imersao-alura/assets/perfil-4.png">
                    <figure>
                        <img src="assets/perfil-4.png" alt="Foto do perfil 4">
                        <figcaption>Luciano</figcaption>
                    </figure>
                </a>
            </nav>
        </section>
    </main>

    <!-- Script para controlar o tema dark/light mode -->
    <script src="theme.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
